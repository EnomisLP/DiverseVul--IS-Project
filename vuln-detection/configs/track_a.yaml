tfidf:
  ngram_range: [1, 3]
  analyzer: "word"
  max_features: 50000
  sublinear_tf: true

logistic_regression:           # EXP_0
  penalty: "l2"
  C: 1.0
  solver: "saga"
  max_iter: 1000
  class_weight: "balanced"
  tol: 1.0e-4
  random_state: 42

random_forest:                 # EXP_1
  n_estimators: 300
  max_features: "sqrt"
  max_depth: null
  class_weight: "balanced_subsample"
  criterion: "gini"
  random_state: 42

cv:
  n_splits: 5
  random_state: 42
  test_size: 0.2